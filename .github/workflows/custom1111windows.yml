name: Build RustDesk Complete Single-File Portable

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      # Checkout repository
      - name: Checkout RustDesk
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Patch config.rs with ID server and Key
      - name: Patch config.rs
        shell: pwsh
        env:
          CUSTOM_ID_SERVER: ${{ secrets.RUSTDESK_ID_SERVER }}
          CUSTOM_KEY: ${{ secrets.RUSTDESK_KEY }}
        run: |
          $path = "libs/hbb_common/src/config.rs"
          $content = Get-Content $path -Raw
          $content = [regex]::Replace(
            $content,
            'pub const RENDEZVOUS_SERVERS:\s*&\[\&str\]\s*=\s*&\[[^\]]*\];',
            'pub const RENDEZVOUS_SERVERS: &[&str] = &["' + $env:CUSTOM_ID_SERVER + '"];'
          )
          $content = [regex]::Replace(
            $content,
            'pub const RS_PUB_KEY:\s*&str\s*=\s*"[^"]*";',
            'pub const RS_PUB_KEY: &str = "' + $env:CUSTOM_KEY + '";'
          )
          Set-Content $path $content -Encoding UTF8

      # Install LLVM
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      # Install Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      # Install flutter_rust_bridge_codegen
      - name: Install flutter_rust_bridge_codegen
        shell: pwsh
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --locked

      # Run flutter pub get to ensure .dart_tool exists
      - name: Flutter pub get
        shell: pwsh
        run: |
          cd flutter
          flutter pub get
          cd ..

      # Generate Flutter-Rust bridge files
      - name: Generate Flutter-Rust Bridge
        shell: pwsh
        run: |
          flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs `
            --dart-output ./flutter/lib/generated_bridge.dart `
            --c-output ./flutter/macos/Runner/bridge_generated.h `
            --llvm-path "D:\1\LLVM"

      # Setup vcpkg
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      # Install vcpkg dependencies
      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"

      # Build the official single-file portable exe
      - name: Build single-file portable exe
        shell: pwsh
        run: |
          python3 .\build.py --portable --flutter

      # Collect portable single-file exe and all dependencies
      - name: Collect portable exe with all DLLs
        shell: pwsh
        run: |
          if (Test-Path ".\artifact") { Remove-Item ".\artifact" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path ".\artifact"
          $releaseFolder = ".\flutter\build\windows\x64\runner\Release"
          Copy-Item "$releaseFolder\*" ".\artifact" -Recurse -Force
          Write-Host "Artifact ready:"
          Get-ChildItem ".\artifact"

      # Upload the artifact
      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-single-file-complete
          path: artifact
