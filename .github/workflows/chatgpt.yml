name: Build RustDesk Single-File Portable1

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-windows:
    name: Build Windows Single-File Portable
    runs-on: windows-2022

    steps:
      # Checkout the repo with submodules
      - name: Checkout RustDesk
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Patch server config with your ID server and Key
      - name: Patch built-in server
        shell: pwsh
        env:
          CUSTOM_ID_SERVER: ${{ secrets.RUSTDESK_ID_SERVER }}
          CUSTOM_KEY: ${{ secrets.RUSTDESK_KEY }}
        run: |
          $path = "libs/hbb_common/src/config.rs"
          $content = Get-Content $path -Raw
          $content = [regex]::Replace(
            $content,
            'pub const RENDEZVOUS_SERVERS:\s*&\[\&str\]\s*=\s*&\[[^\]]*\];',
            'pub const RENDEZVOUS_SERVERS: &[&str] = &["' + $env:CUSTOM_ID_SERVER + '"];'
          )
          $content = [regex]::Replace(
            $content,
            'pub const RS_PUB_KEY:\s*&str\s*=\s*"[^"]*";',
            'pub const RS_PUB_KEY: &str = "' + $env:CUSTOM_KEY + '";'
          )
          Set-Content $path $content -Encoding UTF8
          Write-Host "Patched config.rs successfully"

      # Restore bridge artifact if exists
      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      # Install LLVM
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      # Install Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      # Setup vcpkg and install dependencies
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"

      # Build single-file portable exe (official portable logic)
      - name: Build single-file portable exe
        shell: pwsh
        run: |
          python3 .\build.py --portable --flutter

      # Collect the resulting portable exe
      - name: Collect single-file portable exe
        shell: pwsh
        run: |
          if (Test-Path ".\artifact") { Remove-Item ".\artifact" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path ".\artifact"

          # Copy only the final single-file portable exe
          $releaseExe = Get-ChildItem -Path ".\flutter\build\windows\x64\runner\Release" -Filter "rustdesk*.exe" | Where-Object { $_.Name -notmatch "setup|install|installer" }
          if (!$releaseExe) { throw "Portable exe not found. Check build output." }

          Copy-Item $releaseExe.FullName ".\artifact" -Force
          Write-Host "Artifact ready:"
          Get-ChildItem ".\artifact"

      # Upload the portable exe
      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-single-file-portable
          path: artifact
