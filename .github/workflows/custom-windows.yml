name: Build Custom RustDesk Windows Portable

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-windows:
    name: Build Windows portable exe
    runs-on: windows-2022
    needs: generate-bridge

    steps:
      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch built-in server
        shell: pwsh
        env:
          CUSTOM_ID_SERVER: ${{ secrets.RUSTDESK_ID_SERVER }}
          CUSTOM_KEY: ${{ secrets.RUSTDESK_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CUSTOM_ID_SERVER)) {
            throw "Missing secret: RUSTDESK_ID_SERVER"
          }

          if ([string]::IsNullOrWhiteSpace($env:CUSTOM_KEY)) {
            throw "Missing secret: RUSTDESK_KEY"
          }

          $path = "libs/hbb_common/src/config.rs"
          $content = Get-Content $path -Raw

          $server = $env:CUSTOM_ID_SERVER.Trim()
          $key = $env:CUSTOM_KEY.Trim()

          $content = [regex]::Replace(
            $content,
            'pub const RENDEZVOUS_SERVERS:\s*&\[\&str\]\s*=\s*&\[[^\]]*\];',
            'pub const RENDEZVOUS_SERVERS: &[&str] = &["' + $server + '"];'
          )

          $content = [regex]::Replace(
            $content,
            'pub const RS_PUB_KEY:\s*&str\s*=\s*"[^"]*";',
            'pub const RS_PUB_KEY: &str = "' + $key + '";'
          )

          Set-Content $path $content -Encoding UTF8

          Select-String -Path $path -Pattern "RENDEZVOUS_SERVERS|RS_PUB_KEY"

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace Flutter engine
        shell: pwsh
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          Move-Item -Force windows-x64-release/* "C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/"

      - name: Patch Flutter SDK
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$(dirname "$(dirname "$(which flutter)")")"
          cd "$(dirname "$(dirname "$(which flutter)")")"
          git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-portable-custom

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Build portable exe
        shell: pwsh
        run: |
          python3 .\build.py --portable --flutter

      - name: Collect portable exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".\artifact"

          Get-ChildItem -Path . -Recurse -File -Include "*.exe" |
            Where-Object {
              $_.FullName -notmatch "\\target\\" -and
              $_.FullName -notmatch "\\build\\windows\\x64\\runner\\Release\\rustdesk.exe"
            } |
            Copy-Item -Destination ".\artifact" -Force

          Write-Host "Collected files:"
          Get-ChildItem ".\artifact"

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: my-rustdesk-portable
          path: artifact
